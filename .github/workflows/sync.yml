name: Music Discovery Sync

on:
  schedule:
    # 04:30 UTC daily  →  10:00 AM IST
    - cron: "30 4 * * *"
  workflow_dispatch: {}   # allow manual trigger

jobs:
  sync:
    name: Fetch, Download & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System dependencies ─────────────────────────────────────
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      # ── 3. Python setup ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── 4. Write Drive credentials from Secrets to runner disk ─────
      #   GDRIVE_CREDENTIALS : full contents of credentials.json (JSON string)
      #   GDRIVE_TOKEN        : full contents of token.json       (JSON string)
      - name: Write credentials files
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: |
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GDRIVE_TOKEN }}' > token.json

      # ── 5. Run the pipeline ────────────────────────────────────────
      - name: Run music discovery pipeline
        env:
          LB_TOKEN: ${{ secrets.LB_TOKEN }}
          LB_USERNAME: ${{ secrets.LB_USERNAME }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          # Pass credentials as env vars (the script reads them, not the files)
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: python main.py

      # ── 6. Clean up sensitive files from runner ────────────────────
      - name: Remove credential files
        if: always()
        run: rm -f credentials.json token.json
